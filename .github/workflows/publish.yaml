---
name: Publish to PyPI

on: # yamllint disable-line rule:truthy
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build sdist (Python 2)
    runs-on: ubuntu-latest
    container: python:2.7
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install setuptools (last release supporting Python 2)
        run: pip install "setuptools==44.1.1"

      - name: Build sdist
        working-directory: python
        run: rm -rf dist && python setup.py sdist

      - name: Rewrite PKG-INFO with an unfolded Markdown description
        working-directory: python
        run: |
          python - <<'PY'
          import glob
          import os
          import tarfile

          sdist = glob.glob('dist/*.tar.gz')[0]
          root = os.path.basename(sdist)[:-len('.tar.gz')]

          with tarfile.open(sdist, 'r:gz') as tf:
              tf.extractall('unpacked')

          pkg_info_path = os.path.join('unpacked', root, 'PKG-INFO')
          with open(pkg_info_path) as f:
              lines = f.readlines()

          # distutils folds the Description field using RFC 5322 line
          # continuations (indented, backslash-wrapped). PyPI's renderer
          # does not unfold this before parsing Markdown, so every
          # continuation line's leading whitespace turns into an indented
          # code block. Drop the folded field and append the real
          # README.md as the payload instead (the modern, unfolded form).
          headers = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if line.startswith('Description:'):
                  i += 1
                  while i < len(lines) and (lines[i].startswith(' ') or lines[i] == '\n'):
                      i += 1
                  continue
              headers.append(line)
              i += 1

          with open('../README.md') as f:
              description = f.read()

          with open(pkg_info_path, 'w') as f:
              f.writelines(headers)
              f.write('\n')
              f.write(description)

          os.remove(sdist)
          with tarfile.open(sdist, 'w:gz') as tf:
              tf.add(os.path.join('unpacked', root), arcname=root)
          PY

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frameduino-sdist
          path: python/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/project/frameduino/
    permissions:
      contents: read
      # Required for PyPI trusted publishing (OIDC); no API token needed.
      id-token: write
    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: frameduino-sdist
          path: dist

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
